<!-- Hero Header -->
<section class="bg-white py-16 md:py-24 border-b border-slate-100">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <p class="text-sm font-black tracking-[0.3em] text-emerald-600 uppercase mb-4" appGsapAnimate="fadeUp">FAQ</p>
    <h1 class="text-3xl sm:text-4xl md:text-5xl font-black text-slate-900 mb-6" style="font-family: 'Noto Serif JP', serif" appGsapAnimate="fadeUp">
      よくある質問
    </h1>
    <p class="text-slate-600 text-lg max-w-2xl mx-auto leading-relaxed" appGsapAnimate="fadeUp">
      お客様からよくいただくご質問をまとめました。<br class="hidden md:block">
      その他のご質問はお気軽にお問い合わせください。
    </p>
  </div>
</section>

<!-- Category Filter -->
<section class="bg-slate-50 py-6 border-b border-slate-100 sticky top-0 z-10">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-wrap gap-2 justify-center">
      @for (category of categories; track category) {
        <button
          (click)="selectCategory(category)"
          [class]="selectedCategory === category
            ? 'px-5 py-2 rounded-full text-sm font-bold bg-emerald-600 text-white transition-colors'
            : 'px-5 py-2 rounded-full text-sm font-bold bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors'">
          {{ category }}
        </button>
      }
    </div>
  </div>
</section>

<!-- FAQ Items -->
<section class="bg-white py-16 md:py-24">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8 max-w-3xl">
    @for (item of filteredFaqItems; track item.question; let i = $index) {
      <div class="border-b border-slate-100" appGsapAnimate="fadeUp">
        <button
          (click)="toggleItem(i)"
          class="w-full py-6 flex items-start gap-4 text-left group">
          <span class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-0.5 transition-colors"
                [class]="isOpen(i) ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-500 group-hover:bg-emerald-50 group-hover:text-emerald-600'">
            <svg class="w-4 h-4 transition-transform duration-300" [class]="isOpen(i) ? 'rotate-45' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/>
            </svg>
          </span>
          <div class="flex-1">
            <span class="text-[10px] font-bold tracking-wide text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded mb-2 inline-block">{{ item.category }}</span>
            <h2 class="text-base sm:text-lg font-bold text-slate-900 group-hover:text-emerald-700 transition-colors">
              {{ item.question }}
            </h2>
          </div>
        </button>
        @if (isOpen(i)) {
          <div class="pb-6 pl-12 pr-4">
            <p class="text-slate-600 leading-relaxed">{{ item.answer }}</p>
          </div>
        }
      </div>
    }
  </div>
</section>

<!-- CTA -->
<section class="bg-slate-50 py-16 md:py-20">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8 text-center" appGsapAnimate="fadeUp">
    <h2 class="text-2xl font-black text-slate-900 mb-4" style="font-family: 'Noto Serif JP', serif">
      解決しない場合は
    </h2>
    <p class="text-slate-600 mb-8">お電話またはフォームからお気軽にご相談ください。</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="tel:0178-25-2172" class="inline-flex items-center justify-center px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-full transition-colors">
        0178-25-2172
      </a>
      <a routerLink="/" fragment="contact" class="inline-flex items-center justify-center px-8 py-4 border-2 border-slate-300 hover:border-emerald-500 text-slate-700 hover:text-emerald-700 font-bold rounded-full transition-colors">
        お問い合わせフォーム
      </a>
    </div>
  </div>
</section>
